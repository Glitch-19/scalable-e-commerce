
services:
  auth-db:
    image: postgres:15-alpine
    container_name: auth-postgres-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Tan@0803
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
  cache:
    image: redis:7-alpine
    container_name: auth-redis-cache
    restart: always
    ports:
      - "6379:6379"

  product-db:
    image: mongo:6
    container_name: product-mongo-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - product_db_data:/data/db
volumes:
    product_db_data:
    auth_db_data: 
      